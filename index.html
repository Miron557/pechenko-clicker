<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍪</text></svg>">
    <title>Печенько кликер v1.04</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f5e3c3 0%, #d4a373 100%);
            --container-bg: rgba(255, 248, 240, 0.9);
            --text: #582f0e;
            --accent: #bc6c25;
            --accent-light: #d4a373;
            --card: #fefae0;
            --shadow: 0 25px 60px rgba(0,0,0,0.2);
            --btn-bg: white;
            --btn-border: #d4a373;
            --btn-hover-bg: #fefae0;
            --inset-shadow: inset 0 4px 8px rgba(0,0,0,0.1);
            --prestige-color: #9c27b0;
            --prestige-bg: #f3e5f5;
        }
        body.dark {
            --bg: linear-gradient(135deg, #2c1e16 0%, #1a0f0a 100%);
            --container-bg: rgba(30, 20, 15, 0.95);
            --text: #f0e0c8;
            --accent: #e0a96d;
            --accent-light: #b07d5b;
            --card: #3e2e24;
            --shadow: 0 25px 60px rgba(0,0,0,0.6);
            --btn-bg: #4a382e;
            --btn-border: #8b6b50;
            --btn-hover-bg: #5e4a3a;
            --inset-shadow: inset 0 4px 8px rgba(0,0,0,0.4);
            --prestige-bg: #2a1a2e;
        }
        * { transition: background-color 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s; }
        body {
            margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg); min-height: 100vh; display: flex; justify-content: center;
            align-items: center; user-select: none; color: var(--text);
        }
        .game-container {
            background: var(--container-bg); backdrop-filter: blur(10px); border-radius: 40px;
            padding: 30px; box-shadow: var(--shadow); text-align: center; max-width: 800px;
            width: 95%; position: relative;
        }
        .theme-toggle {
            position: absolute; top: 20px; right: 20px; background: var(--btn-bg);
            border: 2px solid var(--btn-border); color: var(--accent); border-radius: 50%;
            width: 45px; height: 45px; font-size: 1.5rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--inset-shadow); z-index: 2;
        }
        h1 { color: var(--accent); margin-top: 0; font-size: 2.5rem; text-shadow: 2px 2px 0 rgba(255,255,255,0.3); }
        .dark h1 { text-shadow: 2px 2px 0 rgba(0,0,0,0.5); }
        .score-display {
            background: var(--card); border-radius: 20px; padding: 15px 30px;
            margin: 20px 0; box-shadow: var(--inset-shadow); position: relative;
        }
        .rank-badge {
            position: absolute; top: 10px; right: 15px; background: var(--accent-light);
            color: white; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem;
        }
        .score-label { font-size: 1.2rem; color: var(--accent); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .score { font-size: 3.5rem; font-weight: 900; color: var(--text); display: block; line-height: 1.2; }
        .per-second { font-size: 1rem; margin-top: 5px; opacity: 0.8; }
        .cookie-btn {
            background: none; border: none; cursor: pointer; font-size: 150px;
            transition: transform 0.05s ease; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.3));
            outline: none; line-height: 1; padding: 10px;
        }
        .cookie-btn:active { transform: scale(0.9); filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3)); }
        .cookie-btn:hover { transform: scale(1.05); filter: drop-shadow(0 18px 25px rgba(0,0,0,0.35)); }
        .upgrades { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-top: 25px; }
        .upgrade-btn, .shop-btn {
            background: var(--btn-bg); border: 2px solid var(--btn-border); border-radius: 20px;
            padding: 12px 8px; cursor: pointer; font-weight: bold; color: var(--text);
            transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 0.9rem;
        }
        .upgrade-btn:hover:not(:disabled), .shop-btn:hover:not(:disabled) {
            background: var(--btn-hover-bg); border-color: var(--accent); transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }
        .upgrade-btn:disabled, .shop-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(40%); }
        .upgrade-name, .shop-name { display: block; font-size: 1.1rem; }
        .upgrade-cost, .shop-cost { display: block; font-size: 0.8rem; color: var(--accent); margin-top: 4px; }
        .upgrade-count, .shop-count {
            background: var(--accent-light); color: white; border-radius: 10px; padding: 3px 8px;
            font-size: 0.75rem; display: inline-block; margin-top: 4px;
        }
        .prestige-btn {
            margin-top: 20px; background: var(--prestige-bg); border: 2px solid var(--prestige-color);
            color: var(--prestige-color); padding: 12px 25px; border-radius: 20px;
            cursor: pointer; font-weight: bold; font-size: 1rem; transition: all 0.2s;
        }
        .prestige-btn:hover:not(:disabled) { background: var(--prestige-color); color: white; }
        .prestige-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .prestige-display { margin-top: 10px; font-weight: bold; color: var(--prestige-color); }
        .shop-section {
            margin-top: 25px; background: var(--card); border-radius: 20px; padding: 15px;
            box-shadow: var(--inset-shadow);
        }
        .shop-title { font-size: 1.3rem; font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        .shop-items { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .shop-btn { flex: 1 1 140px; max-width: 200px; background: var(--prestige-bg); border-color: var(--prestige-color); }
        .daily-bonus {
            margin-top: 15px; background: #ffeaa7; border-radius: 20px; padding: 10px;
            color: #582f0e; font-weight: bold;
        }
        .daily-bonus button {
            background: #fdcb6e; border: none; border-radius: 15px; padding: 8px 20px;
            font-weight: bold; cursor: pointer;
        }
        .floating-score {
            position: fixed; pointer-events: none; font-weight: 900; font-size: 2rem;
            color: var(--accent); transform: translate(-50%, -50%);
            animation: floatUp 0.8s ease-out forwards; z-index: 1000;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, calc(-50% - 80px)) scale(1.5); }
        }
        .event-notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; border-radius: 30px; font-weight: bold;
            font-size: 1.2rem; box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 2000; animation: slideDown 0.5s ease-out; color: white;
        }
        .event-notification.gold { background: #f1c40f; color: #333; }
        .event-notification.storm { background: #3498db; }
        .event-notification.bunt { background: #e67e22; }
        .event-notification.rain { background: #ff9800; }
        .event-timer {
            background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 15px;
            margin-top: 5px; display: inline-block;
        }
        @keyframes slideDown {
            from { top: -100px; opacity: 0; } to { top: 20px; opacity: 1; }
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 3000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--container-bg); padding: 30px; border-radius: 30px;
            max-width: 600px; width: 90%; box-shadow: var(--shadow); text-align: left; color: var(--text);
        }
        .modal-content h3 { margin-top: 0; color: var(--accent); }
        .modal-content input, .modal-content button {
            margin: 8px 0; padding: 10px; border-radius: 10px;
            border: 1px solid var(--btn-border); background: var(--btn-bg); color: var(--text); font-size: 1rem;
        }
        .modal-content button { cursor: pointer; font-weight: bold; }
        .admin-btn, .leaderboard-btn, .chat-btn, .achievements-btn, .activate-friend-btn, .clan-btn {
            background: var(--btn-bg); border: 2px solid var(--btn-border); color: var(--accent);
            border-radius: 20px; padding: 8px 15px; cursor: pointer; font-weight: bold; margin: 5px;
        }
        .bottom-panel { margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid var(--btn-border); text-align: center; }
        th { color: var(--accent); }
        .chat-messages {
            max-height: 300px; overflow-y: auto; margin: 15px 0; padding: 10px;
            background: var(--card); border-radius: 15px; box-shadow: var(--inset-shadow);
        }
        .chat-message { margin: 8px 0; word-break: break-word; }
        .admin-tag { color: red; font-weight: bold; }
        .friend-tag { color: red; font-weight: bold; }
        .gradient-nick {
            background: linear-gradient(45deg, red, black, red); background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; animation: gradientShift 2s ease infinite; font-weight: bold;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }
        .rank-tag { color: #ff9800; font-weight: bold; }
        .achievement-list { list-style: none; padding: 0; }
        .achievement-list li { padding: 8px; margin: 5px 0; background: var(--card); border-radius: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="game-container">
    <button class="theme-toggle" id="themeToggle" title="Переключить тему">🌓</button>
    <h1>🍪 Печенько кликер v1.04</h1>
    <div class="score-display">
        <span class="score-label">Печенек собрано</span>
        <span class="score" id="score">0</span>
        <div class="per-second">в секунду: <span id="perSecond">0</span></div>
        <span class="rank-badge" id="rankDisplay">Новичок</span>
    </div>
    <button class="cookie-btn" id="cookieBtn">🍪</button>
    <div class="upgrades" id="upgradesContainer"></div>
    <button class="prestige-btn" id="prestigeBtn" disabled>✨ Переродиться (нужно 1 млн 🍪)</button>
    <div class="prestige-display" id="prestigeDisplay">🌟 Очки престижа: 0</div>
    <div class="shop-section" id="shopSection" style="display: none;">
        <div class="shop-title">🛒 Магазин престижа</div>
        <div class="shop-items">
            <button class="shop-btn" id="shopBuy1000"><span class="shop-name">💰 1 000 печенек</span><span class="shop-cost">Цена: 1 🌟</span></button>
            <button class="shop-btn" id="shopBuy10000"><span class="shop-name">💎 10 000 печенек</span><span class="shop-cost">Цена: 2 🌟</span></button>
            <button class="shop-btn" id="shopBuy1M"><span class="shop-name">👑 1 000 000 печенек</span><span class="shop-cost">Цена: 5 🌟</span></button>
        </div>
    </div>
    <div class="daily-bonus" id="dailyBonusSection">
        <span>🎁 Ежедневная награда: </span>
        <button id="claimDailyBtn">Забрать</button>
        <span id="dailyStreak" style="margin-left:10px;"></span>
    </div>
    <div class="bottom-panel">
        <button class="admin-btn" id="openAdminBtn" style="display: none;">⚙️ Админ</button>
        <button class="leaderboard-btn" id="openLeaderboardBtn">🏆 Лидеры</button>
        <button class="chat-btn" id="openChatBtn">💬 Чат</button>
        <button class="achievements-btn" id="openAchievementsBtn">🎖️ Достижения</button>
        <button class="clan-btn" id="openClanBtn">👥 Кланы</button>
        <button class="activate-friend-btn" id="activateFriendBtn" style="display: none;">🔑 Активировать друга</button>
    </div>
</div>

<!-- Админ-панель -->
<div class="modal" id="adminModal">
    <div class="modal-content">
        <h3>🛠️ Админ-панель</h3>
        <div id="adminControls">
            <button id="addCookiesBtn">+1000 печенек</button>
            <button id="addManyCookiesBtn">+1 000 000 печенек</button>
            <button id="addBillionCookiesBtn" class="hidden">+1 000 000 000 печенек</button>
            <button id="adminStartEvent">Запустить Дождь из печенек (x2)</button>
            <button id="adminSetClick2">Множитель клика = 2</button>
            <button id="adminResetClick">Сбросить множитель</button>
            <button id="adminGive10CR" class="hidden">Получить 10 CR</button>
            <button id="adminFullReset">Полный сброс игры</button>
        </div>
        <button id="closeAdminModal" style="margin-top:15px;">Закрыть</button>
    </div>
</div>

<!-- Лидерборд -->
<div class="modal" id="leaderboardModal">
    <div class="modal-content">
        <h3>🏆 Таблицы лидеров</h3>
        <button id="showCookiesTop">Топ по печенькам</button>
        <button id="showCRTop">Топ по CR</button>
        <table id="leaderboardCookiesTable" class="leaderboard-table">
            <thead><tr><th>#</th><th>Имя</th><th>Печенек</th></tr></thead>
            <tbody></tbody>
        </table>
        <table id="leaderboardCRTable" class="leaderboard-table hidden">
            <thead><tr><th>#</th><th>Имя</th><th>CR (Перерождений)</th></tr></thead>
            <tbody></tbody>
        </table>
        <button id="closeLeaderboardModal" style="margin-top:15px;">Закрыть</button>
    </div>
</div>

<!-- Чат -->
<div class="modal" id="chatModal">
    <div class="modal-content">
        <h3>💬 Мировой чат</h3>
        <div class="chat-messages" id="chatMessages"></div>
        <input type="text" id="chatInput" placeholder="Введите сообщение..." style="width:70%;">
        <button id="sendChatBtn">Отправить</button>
        <button id="closeChatModal" style="margin-top:15px;">Закрыть</button>
    </div>
</div>

<!-- Достижения -->
<div class="modal" id="achievementsModal">
    <div class="modal-content">
        <h3>🎖️ Достижения</h3>
        <ul class="achievement-list" id="achievementList"></ul>
        <button id="closeAchievementsModal" style="margin-top:15px;">Закрыть</button>
    </div>
</div>

<!-- Кланы -->
<div class="modal" id="clanModal">
    <div class="modal-content">
        <h3>👥 Кланы</h3>
        <div id="myClanInfo" style="margin-bottom:15px;"></div>
        <button id="createClanBtn">Создать клан</button>
        <button id="joinClanBtn">Вступить в клан</button>
        <div style="margin:10px 0;">
            <input type="text" id="clanNameInput" placeholder="Название клана">
        </div>
        <h4>Топ кланов по CR</h4>
        <table id="clanLeaderboardTable">
            <thead><tr><th>#</th><th>Клан</th><th>Общий CR</th></tr></thead>
            <tbody></tbody>
        </table>
        <button id="closeClanModal" style="margin-top:15px;">Закрыть</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, serverTimestamp, set, get, query, orderByChild, limitToLast, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCKsCycC_nlvlvXonjZdBpViyIVE6yNHpM",
        authDomain: "chat-2f0e3.firebaseapp.com",
        databaseURL: "https://chat-2f0e3-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "chat-2f0e3",
        storageBucket: "chat-2f0e3.firebasestorage.app",
        messagingSenderId: "1074494149039",
        appId: "1:1074494149039:web:31a72ccc5ad8414dccdf5a",
        measurementId: "G-J6C5F9Y2K6"
    };
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const chatRef = ref(database, 'messages');
    const leaderboardRef = ref(database, 'leaderboard');
    const leaderboardCRRef = ref(database, 'leaderboardCR');
    const clansRef = ref(database, 'clans');

    let cookies = 0, cookiesPerClick = 1, cookiesPerSecond = 0, prestigePoints = 0;
    let playerName = localStorage.getItem('pechenkoPlayerName') || '';
    let isSpecialAdmin = localStorage.getItem('pechenkoIsSpecialAdmin') === 'true';
    let isFriendAdmin = localStorage.getItem('pechenkoIsFriendAdmin') === 'true';
    let eventActive = false, eventMultiplier = 1, eventTimerId = null;
    let productionMultiplier = 1, grandmaBoost = 1;
    let currentClan = localStorage.getItem('pechenkoClan') || null;

    const DAILY_KEY = 'pechenkoDaily';
    let dailyData = JSON.parse(localStorage.getItem(DAILY_KEY) || '{"lastClaim":0,"streak":0}');

    // Улучшения, ранги, достижения без изменений
    const upgrades = [
        { id: 'upgrade1', name: '👆 Бабушка', baseCost: 15, cps: 0.5, count: 0, costMult: 1.15 },
        { id: 'upgrade2', name: '🏭 Фабрика', baseCost: 100, cps: 4, count: 0, costMult: 1.18 },
        { id: 'upgrade3', name: '🧙‍♂️ Волшебник', baseCost: 500, cps: 20, count: 0, costMult: 1.20 },
        { id: 'upgrade4', name: '🚀 Печеньколёт', baseCost: 3000, cps: 100, count: 0, costMult: 1.25 },
        { id: 'upgrade5', name: '🛸 НЛО-пекарня', baseCost: 15000, cps: 500, count: 0, costMult: 1.28 },
        { id: 'upgrade6', name: '🕰️ Временной пекарь', baseCost: 100000, cps: 2000, count: 0, costMult: 1.30 },
        { id: 'upgrade7', name: '🌌 Квантовая печенька', baseCost: 500000, cps: 10000, count: 0, costMult: 1.33 }
    ];
    const ranks = [
        { threshold: 0, name: 'Новичок' }, { threshold: 1000, name: 'Пекарь' },
        { threshold: 10000, name: 'Кондитер' }, { threshold: 100000, name: 'Мастер печенья' },
        { threshold: 1000000, name: 'Печеньковый магнат' }, { threshold: 10000000, name: 'Король печенек' },
        { threshold: 100000000, name: 'Бог печенек' }
    ];
    const achievements = [
        { id: 'first_cookie', name: 'Первая печенька', desc: 'Кликнуть 1 раз', check: () => totalClicks >= 1 },
        { id: 'click_100', name: 'Сотня кликов', desc: 'Совершить 100 кликов', check: () => totalClicks >= 100 },
        { id: 'cookies_1000', name: 'Тысяча печенек', desc: 'Накопить 1000 печенек', check: () => cookies >= 1000 },
        { id: 'prestige_1', name: 'Первое перерождение', desc: 'Выполнить перерождение', check: () => prestigePoints >= 1 },
        { id: 'buy_10_grandmas', name: 'Бабушкоман', desc: 'Купить 10 бабушек', check: () => upgrades[0].count >= 10 },
        { id: 'daily_3', name: 'Постоянство', desc: 'Забрать ежедневную награду 3 дня подряд', check: () => dailyData.streak >= 3 },
        { id: 'event_master', name: 'Мастер ивентов', desc: 'Пережить 5 ивентов', check: () => totalEvents >= 5 }
    ];
    let unlockedAchievements = JSON.parse(localStorage.getItem('pechenkoAchievements') || '[]');
    let totalClicks = parseInt(localStorage.getItem('pechenkoTotalClicks') || '0');
    let totalEvents = parseInt(localStorage.getItem('pechenkoTotalEvents') || '0');

    // Генерация кнопок улучшений
    const container = document.getElementById('upgradesContainer');
    upgrades.forEach((u, i) => {
        const btn = document.createElement('button');
        btn.className = 'upgrade-btn';
        btn.id = u.id;
        btn.innerHTML = `<span class="upgrade-name">${u.name}</span><span class="upgrade-cost">Цена: <span id="cost${i+1}">${u.baseCost}</span> 🍪</span><span class="upgrade-count">Куплено: <span id="count${i+1}">0</span></span>`;
        container.appendChild(btn);
    });

    // Ежедневная награда
    function canClaimDaily() {
        const now = Date.now();
        const last = dailyData.lastClaim || 0;
        const oneDay = 24 * 60 * 60 * 1000;
        if (now - last < oneDay) return false;
        if (now - last > 2 * oneDay) dailyData.streak = 0;
        return true;
    }
    function claimDaily() {
        if (!canClaimDaily()) return;
        dailyData.streak = Math.min(dailyData.streak + 1, 7);
        const rewards = [0, 50, 100, 250, 500, 1000, 2500, 5000];
        const amount = rewards[dailyData.streak] || 1000;
        cookies += amount;
        dailyData.lastClaim = Date.now();
        localStorage.setItem(DAILY_KEY, JSON.stringify(dailyData));
        updateDailyUI();
        updateUI();
        alert(`🎁 Вы получили ${amount} печенек! День ${dailyData.streak}`);
    }
    function updateDailyUI() {
        const btn = document.getElementById('claimDailyBtn');
        const streakSpan = document.getElementById('dailyStreak');
        const can = canClaimDaily();
        btn.disabled = !can;
        btn.textContent = can ? 'Забрать' : 'Уже собрано';
        streakSpan.textContent = dailyData.streak > 0 ? `Дней подряд: ${dailyData.streak}` : '';
    }

    // Лидерборды
    function pushToLeaderboard(score) {
        const playerRef = ref(database, 'leaderboard/' + encodeURIComponent(playerName));
        get(playerRef).then((snapshot) => {
            const old = snapshot.val();
            if (!old || score > old.score) {
                set(playerRef, { name: playerName, score: Math.floor(score), timestamp: serverTimestamp() });
            }
        });
    }
    function pushToLeaderboardCR() {
        const playerRef = ref(database, 'leaderboardCR/' + encodeURIComponent(playerName));
        get(playerRef).then((snapshot) => {
            const old = snapshot.val();
            if (!old || prestigePoints > old.score) {
                set(playerRef, { name: playerName, score: prestigePoints, timestamp: serverTimestamp() });
            }
        });
    }
    function loadLeaderboard(type = 'cookies') {
        const refPath = type === 'cookies' ? leaderboardRef : leaderboardCRRef;
        const tableId = type === 'cookies' ? 'leaderboardCookiesTable' : 'leaderboardCRTable';
        const q = query(refPath, orderByChild('score'), limitToLast(10));
        onValue(q, (snapshot) => {
            const entries = [];
            snapshot.forEach(child => entries.push(child.val()));
            entries.sort((a,b) => b.score - a.score);
            const top10 = entries.slice(0, 10);
            const tbody = document.querySelector(`#${tableId} tbody`);
            tbody.innerHTML = '';
            top10.forEach((e, i) => {
                const row = tbody.insertRow();
                row.insertCell().textContent = i+1;
                row.insertCell().textContent = e.name;
                row.insertCell().textContent = e.score.toLocaleString();
            });
        });
    }
    loadLeaderboard('cookies');
    loadLeaderboard('cr');

    function getPlayerRankPosition() {
        const lb = JSON.parse(localStorage.getItem('pechenkoLeaderboard') || '[]');
        const idx = lb.findIndex(e => e.name === playerName);
        return idx !== -1 ? idx+1 : null;
    }

    // Кланы
    function updateClanUI() {
        const infoDiv = document.getElementById('myClanInfo');
        if (currentClan) {
            get(ref(database, 'clans/' + currentClan)).then(snap => {
                const clan = snap.val();
                if (clan) {
                    infoDiv.innerHTML = `Ваш клан: <strong>${currentClan}</strong> | Участников: ${Object.keys(clan.members).length} | CR клана: ${clan.totalCR || 0}`;
                } else {
                    currentClan = null;
                    localStorage.removeItem('pechenkoClan');
                    infoDiv.innerHTML = 'Вы не в клане.';
                }
            });
        } else {
            infoDiv.innerHTML = 'Вы не в клане.';
        }
    }
    function loadClanLeaderboard() {
        const q = query(clansRef, orderByChild('totalCR'), limitToLast(10));
        onValue(q, (snapshot) => {
            const entries = [];
            snapshot.forEach(child => entries.push({ name: child.key, ...child.val() }));
            entries.sort((a,b) => (b.totalCR||0) - (a.totalCR||0));
            const top10 = entries.slice(0, 10);
            const tbody = document.querySelector('#clanLeaderboardTable tbody');
            tbody.innerHTML = '';
            top10.forEach((e, i) => {
                const row = tbody.insertRow();
                row.insertCell().textContent = i+1;
                row.insertCell().textContent = e.name;
                row.insertCell().textContent = (e.totalCR||0).toLocaleString();
            });
        });
    }
    loadClanLeaderboard();

    async function createClan(name) {
        if (!name) return alert('Введите название');
        const clanSnap = await get(ref(database, 'clans/' + name));
        if (clanSnap.exists()) return alert('Клан уже существует');
        // Покидаем старый
        if (currentClan) {
            await update(ref(database, 'clans/' + currentClan + '/members'), { [playerName]: null });
        }
        await set(ref(database, 'clans/' + name), {
            name: name,
            totalCR: 0,
            members: { [playerName]: true }
        });
        currentClan = name;
        localStorage.setItem('pechenkoClan', name);
        updateClanUI();
        alert('Клан создан!');
    }
    async function joinClan(name) {
        if (!name) return alert('Введите название клана');
        const clanSnap = await get(ref(database, 'clans/' + name));
        if (!clanSnap.exists()) return alert('Клан не найден');
        if (currentClan) {
            await update(ref(database, 'clans/' + currentClan + '/members'), { [playerName]: null });
        }
        await update(ref(database, 'clans/' + name + '/members'), { [playerName]: true });
        currentClan = name;
        localStorage.setItem('pechenkoClan', name);
        updateClanUI();
        alert('Вы вступили в клан!');
    }
    async function addCRToClan(cr) {
        if (!currentClan) return;
        const clanRef = ref(database, 'clans/' + currentClan);
        const snap = await get(clanRef);
        if (!snap.exists()) return;
        const clan = snap.val();
        const newTotal = (clan.totalCR || 0) + cr;
        await update(clanRef, { totalCR: newTotal });
    }

    // Перерождение с обновлением CR
    function performPrestige() {
        if (cookies >= 1_000_000 && confirm('Переродиться?')) {
            pushToLeaderboard(cookies);
            cookies = 0; cookiesPerClick = 1;
            upgrades.forEach(u => u.count = 0);
            updateCookiesPerSecond();
            prestigePoints++;
            pushToLeaderboardCR();
            if (currentClan) addCRToClan(1);
            updateUI();
            alert('Перерождение успешно!');
        }
    }

    // Остальные функции (updateUI, buyUpgrade и т.д.) остаются, добавим только обновление видимости спецкнопок
    function updateAdminVisibility() {
        const openAdmin = document.getElementById('openAdminBtn');
        const activateFriend = document.getElementById('activateFriendBtn');
        openAdmin.style.display = (isSpecialAdmin || isFriendAdmin) ? 'inline-block' : 'none';
        activateFriend.style.display = (!isFriendAdmin && !isSpecialAdmin) ? 'inline-block' : 'none';
    }

    // При открытии админ-панели показываем спецкнопки только для tr3haszz
    document.getElementById('openAdminBtn').addEventListener('click', () => {
        if (!isSpecialAdmin && !isFriendAdmin) return;
        document.getElementById('adminModal').classList.add('active');
        document.getElementById('addBillionCookiesBtn').classList.toggle('hidden', !isSpecialAdmin);
        document.getElementById('adminGive10CR').classList.toggle('hidden', !isSpecialAdmin);
    });

    // Обработчики кнопок
    document.getElementById('addBillionCookiesBtn').addEventListener('click', () => { cookies += 1e9; updateUI(); });
    document.getElementById('adminGive10CR').addEventListener('click', () => {
        prestigePoints += 10;
        pushToLeaderboardCR();
        if (currentClan) addCRToClan(10);
        updateUI();
        alert('+10 CR!');
    });

    // Кнопки кланов
    document.getElementById('openClanBtn').addEventListener('click', () => {
        updateClanUI();
        document.getElementById('clanModal').classList.add('active');
    });
    document.getElementById('closeClanModal').addEventListener('click', () => document.getElementById('clanModal').classList.remove('active'));
    document.getElementById('createClanBtn').addEventListener('click', () => {
        const name = document.getElementById('clanNameInput').value.trim();
        if (name) createClan(name);
    });
    document.getElementById('joinClanBtn').addEventListener('click', () => {
        const name = document.getElementById('clanNameInput').value.trim();
        if (name) joinClan(name);
    });

    // Переключение таблиц лидеров
    document.getElementById('showCookiesTop').addEventListener('click', () => {
        document.getElementById('leaderboardCookiesTable').classList.remove('hidden');
        document.getElementById('leaderboardCRTable').classList.add('hidden');
    });
    document.getElementById('showCRTop').addEventListener('click', () => {
        document.getElementById('leaderboardCookiesTable').classList.add('hidden');
        document.getElementById('leaderboardCRTable').classList.remove('hidden');
    });

    // Инициализация
    function loadGame() {
        const saved = localStorage.getItem('pechenkoClickerSave');
        if (saved) {
            const data = JSON.parse(saved);
            cookies = data.cookies || 0; cookiesPerClick = data.cookiesPerClick || 1;
            prestigePoints = data.prestigePoints || 0;
            upgrades.forEach((u, i) => u.count = data.upgrades[i].count || 0);
            updateCookiesPerSecond();
        }
        if (localStorage.getItem('cookieClickerTheme') === 'dark') document.body.classList.add('dark');
        if (!playerName) {
            playerName = prompt('Введите ваше имя:', 'Игрок') || 'Аноним';
            localStorage.setItem('pechenkoPlayerName', playerName);
        }
        if (isSpecialAdmin) playerName = 'tr3haszz';
        if (isFriendAdmin) playerName = 't1nator';
        updateAdminVisibility();
        updateDailyUI();
    }
